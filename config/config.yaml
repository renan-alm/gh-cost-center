# GitHub Configuration
github:
  # Enterprise name is required. Prefer setting via environment var GITHUB_ENTERPRISE.
  # Leave as placeholder or blank if supplying via environment.
  enterprise: "eficode-partner-demo"

  # Organizations to manage (required for repos, custom-prop, and teams/organization modes).
  organizations:
    - "EficodeDemoOrg"

# Cost Center Configuration
cost_center:
  mode: "teams"  # Options: "users", "teams", "repos", "custom-prop"

  teams:
    scope: "organization"    # Options: "organization" or "enterprise"
    strategy: "manual"       # Options: "auto" or "manual"
    auto_create: true        # Automatically create cost centers for teams

    # Full sync: remove users from cost centers when they leave the team
    remove_unmatched_users: true

    # Manual team→cost-center mappings (only used when strategy is "manual")
    mappings:
      "EficodeDemoOrg/copilot-access": "CC-copilot-access-01"
      # "my-org/frontend-team": "CC-FRONTEND-001"
      # "my-org/backend-team": "CC-BACKEND-001"

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  file: "logs/populate_cost_centers.log"